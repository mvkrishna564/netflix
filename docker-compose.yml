docker-compose updocker-compose upversion: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: netflix-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      # MONGO_INITDB_DATABASE: Specifies the name of the database to be created and initialized
      # when the MongoDB container starts for the first time.
      # Used by: MongoDB official Docker image during initial setup
      # Value: 'netflix-clone' - the name of the primary database for the Netflix clone application
      # Reference: https://hub.docker.com/_/mongo
      MONGO_INITDB_DATABASE: netflix-clone

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netflix-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/netflix-clone
      - JWT_SECRET=your_super_secret_change_this
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netflix-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
